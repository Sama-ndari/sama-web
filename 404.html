<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8" />
  <script>
    (function () {
      try {
        var v = localStorage.getItem("webshow-theme");
        document.documentElement.setAttribute("data-theme", v === "dark" || v === "light" ? v : "light");
      } catch (e) {
        document.documentElement.setAttribute("data-theme", "light");
      }
    })();
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page not found - Sama Web</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" href="assets/img/logo.svg" type="image/svg+xml" />
  <link rel="canonical" href="https://web.samandari.dev/404.html" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Syne:wght@600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="assets/css/base.css" />
  <link rel="stylesheet" href="assets/css/components.css" />
</head>
<body>
  <div class="body-mesh" aria-hidden="true"></div>
  <main id="main" class="nf-page">
    <div class="container nf-page__inner">
      <h1 id="nfTitle" class="nf-page__title"></h1>
      <p id="nfDesc" class="nf-page__desc"></p>
      <a href="index.html" class="btn btn--primary" id="nfLink"><i class="bi bi-house" aria-hidden="true"></i> </a>
    </div>
  </main>
  <script src="assets/js/i18n.js"></script>
  <script src="assets/js/theme.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      initLangFromUrl();
      document.getElementById("nfTitle").textContent = t("not_found_title");
      document.getElementById("nfDesc").textContent = t("not_found_desc");
      var link = document.getElementById("nfLink");
      link.appendChild(document.createTextNode(t("not_found_home")));
      document.title = t("not_found_title") + " - " + t("store_name");
      document.documentElement.lang = getLang();
    });
  </script>
</body>
</html>
