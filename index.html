<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8" />
  <script>
    (function () {
      try {
        var v = localStorage.getItem("webshow-theme");
        document.documentElement.setAttribute("data-theme", v === "dark" || v === "light" ? v : "light");
      } catch (e) {
        document.documentElement.setAttribute("data-theme", "light");
      }
    })();
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sama Web - Curated web experiences</title>
  <meta name="description" content="Showcase of public web projects: community platforms and privacy-forward products." />
  <link rel="icon" href="assets/img/logo.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="assets/img/logo.svg" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Sama Web - curated web experiences" />
  <meta property="og:description" content="Community platforms and privacy-first sites - fast, accessible, modern stacks." />
  <meta property="og:image" content="https://web.samandari.dev/assets/img/og.svg" />
  <meta property="og:url" content="https://web.samandari.dev/" />
  <meta property="og:site_name" content="Sama Web" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Sama Web" />
  <meta name="twitter:description" content="Curated public web projects by Samandari." />
  <meta name="twitter:image" content="https://web.samandari.dev/assets/img/og.svg" />
  <link rel="canonical" href="https://web.samandari.dev/" />
  <link rel="alternate" hreflang="en" href="https://web.samandari.dev/" />
  <link rel="alternate" hreflang="fr" href="https://web.samandari.dev/?lang=fr" />
  <link rel="alternate" hreflang="x-default" href="https://web.samandari.dev/" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Syne:wght@600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="assets/css/base.css" />
  <link rel="stylesheet" href="assets/css/components.css" />
</head>
<body>
  <div class="body-mesh" aria-hidden="true"></div>
  <header class="header" role="banner">
    <div class="container header__inner">
      <a href="index.html" class="header__logo">
        <img src="assets/img/logo.svg" alt="" class="header__logo-img" width="34" height="34" decoding="async" />
        <span id="storeName"></span>
      </a>
      <div class="header__search">
        <i class="bi bi-search" aria-hidden="true"></i>
        <input type="search" id="searchInput" name="q" autocomplete="off" />
      </div>
      <nav class="header__nav" aria-label="Settings">
        <button type="button" class="header__toggle" id="langToggle" title="Language" aria-label="Toggle language">EN</button>
        <button type="button" class="header__toggle" id="themeToggle" title="Theme" aria-label="Toggle color theme">
          <i class="bi bi-moon-fill" aria-hidden="true"></i>
        </button>
        <a href="https://www.samandari.dev/" target="_blank" rel="noopener noreferrer" class="header__link" aria-label="Portfolio website">
          <i class="bi bi-globe2" aria-hidden="true"></i>
        </a>
      </nav>
    </div>
  </header>

  <main id="main">
    <section class="hero" aria-labelledby="heroTitle">
      <div class="container">
        <p class="hero__label" id="heroLabel"></p>
        <h1 class="hero__title" id="heroTitle"></h1>
        <p class="hero__subtitle" id="heroSubtitle"></p>
        <div class="hero__search-mobile">
          <i class="bi bi-search" aria-hidden="true"></i>
          <input type="search" id="searchInputMobile" name="qm" autocomplete="off" />
        </div>
      </div>
    </section>

    <section class="catalog" aria-labelledby="catalogHeading">
      <h2 id="catalogHeading" class="visually-hidden">Project catalog</h2>
      <div class="container">
        <div class="catalog__filters" id="filters"></div>
        <div class="catalog__grid" id="appGrid"></div>
        <p class="catalog__empty" id="emptyState" hidden></p>
      </div>
    </section>
  </main>

  <footer class="footer" role="contentinfo">
    <div class="container footer__inner">
      <p id="footerRights"></p>
      <p class="footer__credit"><span id="footerBuilt"></span> <a href="https://www.samandari.dev/" target="_blank" rel="noopener noreferrer">Samandari</a></p>
    </div>
  </footer>

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "Sama Web",
    "url": "https://web.samandari.dev",
    "logo": "https://web.samandari.dev/assets/img/logo.svg"
  }
  </script>
  <script src="assets/js/i18n.js"></script>
  <script src="assets/js/theme.js"></script>
  <script src="assets/js/apps.js"></script>
  <script src="assets/js/main.js"></script>
</body>
</html>
