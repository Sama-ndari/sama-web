<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8" />
  <script>
    (function () {
      try {
        var v = localStorage.getItem("webshow-theme");
        document.documentElement.setAttribute("data-theme", v === "dark" || v === "light" ? v : "light");
      } catch (e) {
        document.documentElement.setAttribute("data-theme", "light");
      }
    })();
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project - Sama Web</title>
  <meta name="description" content="Project details and live site" />
  <link rel="icon" href="assets/img/logo.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="assets/img/logo.svg" />
  <link rel="canonical" href="https://web.samandari.dev/app.html" />
  <link rel="alternate" hreflang="en" href="https://web.samandari.dev/app.html" />
  <link rel="alternate" hreflang="fr" href="https://web.samandari.dev/app.html?lang=fr" />
  <link rel="alternate" hreflang="x-default" href="https://web.samandari.dev/app.html" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Syne:wght@600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="assets/css/base.css" />
  <link rel="stylesheet" href="assets/css/components.css" />
</head>
<body>
  <div class="body-mesh" aria-hidden="true"></div>
  <header class="header" role="banner">
    <div class="container header__inner">
      <a href="index.html" class="header__logo">
        <img src="assets/img/logo.svg" alt="" class="header__logo-img" width="34" height="34" decoding="async" />
        <span id="storeName"></span>
      </a>
      <nav class="header__nav" aria-label="Settings">
        <button type="button" class="header__toggle" id="langToggle" title="Language" aria-label="Toggle language">EN</button>
        <button type="button" class="header__toggle" id="themeToggle" title="Theme" aria-label="Toggle color theme">
          <i class="bi bi-moon-fill" aria-hidden="true"></i>
        </button>
        <a href="https://www.samandari.dev/" target="_blank" rel="noopener noreferrer" class="header__link" aria-label="Portfolio website">
          <i class="bi bi-globe2" aria-hidden="true"></i>
        </a>
        <a href="index.html" class="header__link header__link--back" id="backLink">
          <i class="bi bi-arrow-left" aria-hidden="true"></i> <span></span>
        </a>
      </nav>
    </div>
  </header>

  <main id="main">
    <section class="app-detail" id="appDetail">
      <div class="container">
        <div class="app-hero" id="appHero"></div>
        <div class="app-content">
          <div class="app-content__main">
            <div class="app-trial" id="trialBanner" hidden></div>
            <div class="app-videos" id="videosSection" hidden></div>
            <div class="app-screenshots" id="screenshotsSection" hidden>
              <h2 id="screenshotsTitle"></h2>
              <div class="screenshots-track" id="screenshotsTrack"></div>
            </div>
            <div class="app-description">
              <h2 id="aboutTitle"></h2>
              <p id="appDescription"></p>
            </div>
            <div class="app-features">
              <h2 id="featuresTitle"></h2>
              <ul id="featuresList"></ul>
            </div>
          </div>
          <aside class="app-sidebar" aria-label="Project details">
            <div class="sidebar-card" id="sidebarInfo"></div>
            <div class="sidebar-card sidebar-card--tiers" id="sidebarTiers" hidden></div>
            <div class="sidebar-card sidebar-card--legal" id="sidebarLegal" hidden></div>
          </aside>
        </div>
      </div>
    </section>
  </main>

  <div class="lightbox" id="lightbox" hidden>
    <button type="button" class="lightbox__close" id="lightboxClose" aria-label="Close preview"><i class="bi bi-x-lg" aria-hidden="true"></i></button>
    <button type="button" class="lightbox__nav lightbox__nav--prev" id="lightboxPrev" aria-label="Previous image"><i class="bi bi-chevron-left" aria-hidden="true"></i></button>
    <img class="lightbox__img" id="lightboxImg" src="" alt="" width="1200" height="675" />
    <button type="button" class="lightbox__nav lightbox__nav--next" id="lightboxNext" aria-label="Next image"><i class="bi bi-chevron-right" aria-hidden="true"></i></button>
  </div>

  <footer class="footer" role="contentinfo">
    <div class="container footer__inner">
      <p id="footerRights"></p>
      <p class="footer__credit"><span id="footerBuilt"></span> <a href="https://www.samandari.dev/" target="_blank" rel="noopener noreferrer">Samandari</a></p>
    </div>
  </footer>

  <script src="assets/js/i18n.js"></script>
  <script src="assets/js/theme.js"></script>
  <script src="assets/js/apps.js"></script>
  <script src="assets/js/main.js"></script>
</body>
</html>
